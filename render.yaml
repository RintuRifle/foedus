# Foedus — Render Blueprint (Infrastructure as Code)
# Deploy: Render dashboard → New → Blueprint → point at this repo.
# Free/starter tiers everywhere → runs at ~₹0 for early users.

services:
  # ── FastAPI web service ─────────────────────────────────────
  - type: web
    name: foedus-api
    runtime: docker
    rootDir: .
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL          # Supabase pooler URL (postgresql+asyncpg://...)
        sync: false
      - key: DATABASE_URL_SYNC     # For alembic (postgresql://...)
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: foedus-redis
          property: connectionString
      - key: QDRANT_URL            # Qdrant Cloud cluster URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS          # https://your-app.vercel.app
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "false"



  # ── Redis (broker + pub/sub) ────────────────────────────────
  - type: keyvalue
    name: foedus-redis
    plan: free
    ipAllowList: []
