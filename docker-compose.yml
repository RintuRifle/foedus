# Foedus — Local Development Services
# Usage: docker-compose up -d

version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 16 with pgvector extension
  # ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: foedus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: foedus
      POSTGRES_PASSWORD: foedus_dev_2024
      POSTGRES_DB: foedus_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foedus -d foedus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis 7 — Celery broker + pub/sub for WebSocket
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: foedus-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Qdrant — Vector Database for semantic search
  # ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: foedus-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
